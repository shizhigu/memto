<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" width="1280" height="440" role="img" aria-label="memento — memory for your fleet of AI coding agents">
  <defs>
    <!-- moody dark background with warm sepia undertone -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0b09"/>
      <stop offset="100%" stop-color="#181210"/>
    </linearGradient>
    <!-- warm amber text gradient (think: faded polaroid ink under a single lamp) -->
    <linearGradient id="text-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbe8a7"/>
      <stop offset="100%" stop-color="#d9893a"/>
    </linearGradient>
    <!-- subtle vignette halo -->
    <radialGradient id="halo" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#f5b94c" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#f5b94c" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#f5b94c" stop-opacity="0"/>
    </radialGradient>
    <!-- paper texture for polaroids -->
    <filter id="paper-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feColorMatrix values="0 0 0 0 0.96  0 0 0 0 0.94  0 0 0 0 0.88  0 0 0 0.08 0"/>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" in="SourceAlpha"/>
      <feOffset dx="0" dy="4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1280" height="440" fill="url(#bg)"/>
  <ellipse cx="640" cy="220" rx="640" ry="260" fill="url(#halo)"/>

  <!-- faint horizontal scan lines (old film feel) -->
  <g opacity="0.04" stroke="#f5b94c" stroke-width="1">
    <line x1="0" y1="110" x2="1280" y2="110"/>
    <line x1="0" y1="220" x2="1280" y2="220"/>
    <line x1="0" y1="330" x2="1280" y2="330"/>
  </g>

  <!-- 4 polaroids representing the 4 runtimes, scattered around centerpiece -->
  <!-- each polaroid is a white-ish card with slight rotation, caption at bottom -->

  <!-- claude-code polaroid (top-left) -->
  <g transform="translate(130, 115) rotate(-8)" filter="url(#soft-shadow)">
    <rect x="-55" y="-55" width="110" height="130" fill="#f4ede0" rx="2"/>
    <rect x="-47" y="-47" width="94" height="88" fill="#d97757" opacity="0.9"/>
    <text x="0" y="-5" font-family="Georgia, serif" font-size="14" font-weight="700" text-anchor="middle" fill="#3a1a10">C</text>
    <text x="0" y="60" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#2a1a10" letter-spacing="0.5">claude-code</text>
  </g>

  <!-- codex polaroid (top-right) -->
  <g transform="translate(1150, 120) rotate(6)" filter="url(#soft-shadow)">
    <rect x="-55" y="-55" width="110" height="130" fill="#f4ede0" rx="2"/>
    <rect x="-47" y="-47" width="94" height="88" fill="#5e9bff" opacity="0.9"/>
    <text x="0" y="-5" font-family="Georgia, serif" font-size="14" font-weight="700" text-anchor="middle" fill="#0a1a3a">C</text>
    <text x="0" y="60" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#2a1a10" letter-spacing="0.5">codex</text>
  </g>

  <!-- hermes polaroid (bottom-left) -->
  <g transform="translate(125, 325) rotate(5)" filter="url(#soft-shadow)">
    <rect x="-55" y="-55" width="110" height="130" fill="#f4ede0" rx="2"/>
    <rect x="-47" y="-47" width="94" height="88" fill="#f5b94c" opacity="0.9"/>
    <text x="0" y="-5" font-family="Georgia, serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2a1805">H</text>
    <text x="0" y="60" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#2a1a10" letter-spacing="0.5">hermes</text>
  </g>

  <!-- openclaw polaroid (bottom-right) -->
  <g transform="translate(1155, 320) rotate(-7)" filter="url(#soft-shadow)">
    <rect x="-55" y="-55" width="110" height="130" fill="#f4ede0" rx="2"/>
    <rect x="-47" y="-47" width="94" height="88" fill="#7bd88f" opacity="0.9"/>
    <text x="0" y="-5" font-family="Georgia, serif" font-size="14" font-weight="700" text-anchor="middle" fill="#0a2a12">O</text>
    <text x="0" y="60" font-family="'Courier New', monospace" font-size="9" text-anchor="middle" fill="#2a1a10" letter-spacing="0.5">openclaw</text>
  </g>

  <!-- faint strings connecting polaroids to center (like a detective's evidence board) -->
  <g stroke="#f5b94c" stroke-width="1" stroke-opacity="0.3" fill="none">
    <path d="M 200 135 Q 400 200, 640 220"/>
    <path d="M 1080 135 Q 880 200, 640 220"/>
    <path d="M 200 330 Q 400 280, 640 220"/>
    <path d="M 1080 330 Q 880 280, 640 220"/>
  </g>

  <!-- centerpiece: memento -->
  <g filter="url(#text-glow)">
    <text x="640" y="220"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="130"
          font-weight="700"
          text-anchor="middle"
          fill="url(#text-grad)"
          letter-spacing="-2">
      memento
    </text>
  </g>

  <!-- typewriter-style tagline -->
  <text x="640" y="270"
        font-family="'Courier New', monospace"
        font-size="17"
        font-weight="400"
        text-anchor="middle"
        fill="#d9c5a0"
        letter-spacing="2">
    memory for your fleet of AI coding agents
  </text>

  <!-- hand-written-feel sub-tagline -->
  <text x="640" y="308"
        font-family="'Courier New', monospace"
        font-size="13"
        font-weight="400"
        text-anchor="middle"
        fill="#f5b94c"
        letter-spacing="1.5"
        opacity="0.85">
    wake up any past session · ask it anything · never mutate the original
  </text>

  <!-- bottom pill -->
  <g transform="translate(640, 388)">
    <rect x="-115" y="-16" width="230" height="28" rx="14" fill="#241d18" stroke="#4a3520" stroke-width="1"/>
    <text y="4"
          font-family="'Courier New', monospace"
          font-size="12"
          text-anchor="middle"
          fill="#d9c5a0"
          letter-spacing="2">
      v0.1 · MIT · TypeScript + Bun
    </text>
  </g>

  <!-- corner accent: taped-on "note" with quote -->
  <g transform="translate(640, 48) rotate(-1)" filter="url(#soft-shadow)">
    <rect x="-200" y="-16" width="400" height="32" fill="#f4ede0" rx="1" opacity="0.95"/>
    <text y="5"
          font-family="Georgia, serif"
          font-style="italic"
          font-size="14"
          text-anchor="middle"
          fill="#2a1a10">
      “your agents remember. you don't. fix it.”
    </text>
  </g>
</svg>
