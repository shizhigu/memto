name: publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Deliberately no registry-url here — that auto-writes an .npmrc with
      # _authToken=${NODE_AUTH_TOKEN}, which shadows OIDC auth. We want the
      # npm CLI to detect the ACTIONS_ID_TOKEN_REQUEST_* env vars and use
      # Trusted Publisher flow directly.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Trusted Publisher OIDC support landed in npm 11.5.1 — node 20 ships
      # with a much older npm, so upgrade explicitly.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Build
        run: bun run build

      - name: Verify bundle runs under plain node
        run: node dist/cli.js --help

      - name: Publish to npm
        run: npm publish --provenance --access public
