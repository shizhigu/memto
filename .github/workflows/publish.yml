name: publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Build
        run: bun run build

      - name: Verify bundle runs under plain node
        run: node dist/cli.js --help

      # Uses npm's OIDC Trusted Publisher — no NPM_TOKEN secret required.
      # Configure once at https://www.npmjs.com/package/memto-cli/access
      # (owner: shizhigu, repo: memto, workflow: publish.yml).
      - name: Publish to npm
        run: npm publish --provenance --access public
