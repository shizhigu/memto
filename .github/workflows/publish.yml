name: publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun x tsc --noEmit

      - name: Build
        run: bun run build

      - name: Verify bundle runs under plain node
        run: node dist/cli.js --help

      - name: Debug OIDC claims
        run: |
          TOKEN=$(curl -sS -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" | jq -r .value)
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          pad=$((4 - ${#PAYLOAD} % 4))
          [ "$pad" -ne 4 ] && PAYLOAD="$PAYLOAD$(printf '=%.0s' $(seq 1 $pad))"
          echo "--- OIDC JWT claims ---"
          echo "$PAYLOAD" | base64 -d 2>/dev/null | jq '{sub, aud, repository, repository_owner, workflow_ref, job_workflow_ref, ref, event_name, environment}'

      - name: Publish to npm
        run: npm publish --provenance --access public --loglevel=verbose 2>&1 | tail -40
