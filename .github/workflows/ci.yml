name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun: [latest]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun x tsc --noEmit
      - name: Lint
        run: bun x biome check .
        continue-on-error: true
      - name: Tests
        run: bun test
